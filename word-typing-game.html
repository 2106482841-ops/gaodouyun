<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高斗云·单词速打</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0d1a;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
}
.bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.bg-circle {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.18;
}
.bg-circle.c1 { width: 500px; height: 500px; background: #f7971e; top: -150px; left: -150px; animation: drift1 12s ease-in-out infinite alternate; }
.bg-circle.c2 { width: 400px; height: 400px; background: #6c63ff; bottom: -100px; right: -100px; animation: drift2 14s ease-in-out infinite alternate; }
.bg-circle.c3 { width: 300px; height: 300px; background: #00c9ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 10s ease-in-out infinite alternate; }
@keyframes drift1 { to { transform: translate(60px, 40px); } }
@keyframes drift2 { to { transform: translate(-50px, -60px); } }
@keyframes drift3 { to { transform: translate(-50%, -60%); } }

.container {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 32px;
  padding: 40px 48px;
  width: 720px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
}
.header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
h1 {
  background: linear-gradient(90deg, #f7971e, #ffd200);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-size: 26px; font-weight: 800; letter-spacing: 2px;
}
.badge {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e; font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px; letter-spacing: 1px;
}
.subtitle { color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 4px; margin-bottom: 26px; }

/* 统计栏 */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.stat-box {
  background: rgba(0,0,0,0.3); border-radius: 14px;
  padding: 12px 10px; text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}
.stat-box .label { color: rgba(255,255,255,0.35); font-size: 11px; margin-bottom: 4px; }
.stat-box .value { color: #ffd200; font-size: 22px; font-weight: 700; }
.stat-box .value.timer-warn { color: #f87171; animation: pulse 0.5s ease-in-out infinite alternate; }
@keyframes pulse { to { opacity: 0.5; } }

/* 进度条 */
.progress-wrap { margin-bottom: 18px; }
.progress-bar {
  width: 100%; height: 6px;
  background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 6px; transition: width 0.4s ease; width: 0%;
}

/* 游戏卡片 */
.card {
  background: rgba(0,0,0,0.4);
  border-radius: 22px; padding: 36px 28px;
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 18px; min-height: 180px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  transition: border-color 0.2s;
  position: relative; overflow: hidden;
}
.card.correct-flash { border-color: #4ade80; box-shadow: 0 0 30px rgba(74,222,128,0.15); }
.card.wrong-flash { border-color: #f87171; box-shadow: 0 0 30px rgba(248,113,113,0.15); }

.word-en {
  font-size: 56px; font-weight: 800; color: #fff;
  letter-spacing: 2px; margin-bottom: 10px;
  text-shadow: 0 0 40px rgba(255,210,0,0.2);
  transition: all 0.2s;
}
.word-phonetic { color: rgba(255,255,255,0.3); font-size: 15px; margin-bottom: 6px; letter-spacing: 1px; }
.word-pos { color: #6c63ff; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

/* 输入区 */
.input-area { display: flex; gap: 12px; margin-bottom: 14px; }
.input-area input {
  flex: 1; padding: 16px 20px;
  border-radius: 16px; border: 2px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.4); color: #fff;
  font-size: 18px; font-family: inherit;
  outline: none; transition: all 0.2s;
}
.input-area input::placeholder { color: rgba(255,255,255,0.2); }
.input-area input:focus { border-color: #ffd200; background: rgba(0,0,0,0.55); }
.input-area input:disabled { opacity: 0.3; }
.input-area button {
  padding: 16px 28px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e; font-size: 16px; font-weight: 800;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.input-area button:hover:not(:disabled) { transform: scale(1.04); box-shadow: 0 6px 24px rgba(255,210,0,0.3); }
.input-area button:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

/* 跳过按钮 */
.btn-skip {
  background: none; border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.35); font-size: 13px;
  padding: 8px 18px; border-radius: 10px; cursor: pointer;
  transition: all 0.2s; margin-bottom: 10px;
}
.btn-skip:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); }
.btn-skip:disabled { opacity: 0.2; cursor: not-allowed; }

/* 反馈 */
.feedback {
  font-size: 15px; min-height: 26px; font-weight: 600;
  display: flex; align-items: center; gap: 6px; justify-content: center;
}
.feedback.correct { color: #4ade80; }
.feedback.wrong { color: #f87171; }

/* 连击 */
.combo-badge {
  position: absolute; top: 14px; right: 16px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e; font-size: 12px; font-weight: 800;
  padding: 4px 12px; border-radius: 20px;
  display: none; animation: pop 0.3s ease;
}
@keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* 开始界面 */
.start-screen {
  display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 10px 0;
}
.start-screen .desc { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.8; text-align: center; }
.difficulty { display: flex; gap: 10px; }
.diff-btn {
  padding: 8px 20px; border-radius: 10px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15); background: none;
  color: rgba(255,255,255,0.5); font-size: 13px; transition: all 0.2s;
}
.diff-btn.active, .diff-btn:hover {
  background: rgba(255,210,0,0.12); border-color: #ffd200; color: #ffd200;
}
.btn-start {
  padding: 16px 56px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e; font-size: 20px; font-weight: 800;
  cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
}
.btn-start:hover { transform: scale(1.05); box-shadow: 0 10px 32px rgba(255,210,0,0.35); }

/* 结束界面 */
.end-screen {
  display: none; flex-direction: column; align-items: center; gap: 10px; padding: 8px 0;
}
.end-title { color: rgba(255,255,255,0.5); font-size: 15px; letter-spacing: 2px; }
.final-score { font-size: 64px; font-weight: 800; color: #ffd200; line-height: 1; }
.final-grade {
  font-size: 22px; font-weight: 700; letter-spacing: 2px;
  padding: 4px 18px; border-radius: 20px; margin-top: 4px;
}
.final-stats { color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.8; text-align: center; }
.end-btns { display: flex; gap: 12px; margin-top: 10px; }
.btn-restart {
  padding: 14px 36px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.btn-restart:hover { transform: scale(1.04); }

.hidden { display: none; }
</style>
</head>
<body>
<div class="bg">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>
</div>

<div class="container">
  <div class="header">
    <h1>高斗云·单词速打</h1>
    <div class="badge">右脑图像记忆法</div>
  </div>
  <div class="subtitle">SPEED TYPING CHALLENGE</div>

  <div class="stats">
    <div class="stat-box">
      <div class="label">得分</div>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="stat-box">
      <div class="label">进度</div>
      <div class="value"><span id="roundDisplay">0</span><span style="color:rgba(255,255,255,0.3);font-size:14px">/20</span></div>
    </div>
    <div class="stat-box">
      <div class="label">正确率</div>
      <div class="value" id="accuracyDisplay">--</div>
    </div>
    <div class="stat-box">
      <div class="label">剩余时间</div>
      <div class="value" id="timerDisplay">--</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
  </div>

  <div class="card" id="card">
    <div class="combo-badge" id="comboBadge"></div>

    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
      <div class="desc">看英文单词，输入对应的中文释义<br>答对得分，连击有加成，限时挑战</div>
      <div class="difficulty">
        <button class="diff-btn active" data-diff="easy">简单 30秒/题</button>
        <button class="diff-btn" data-diff="normal">普通 15秒/题</button>
        <button class="diff-btn" data-diff="hard">困难 8秒/题</button>
      </div>
      <button class="btn-start" id="btnStart">开始挑战</button>
    </div>

    <!-- 游戏进行中 -->
    <div id="gameScreen" class="hidden" style="width:100%; text-align:center;">
      <div class="word-pos" id="wordPos">n.</div>
      <div class="word-en" id="wordDisplay">---</div>
      <div class="word-phonetic" id="wordPhonetic">&nbsp;</div>
    </div>

    <!-- 结束界面 -->
    <div class="end-screen" id="endScreen">
      <div class="end-title">挑战完成</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="final-grade" id="finalGrade"></div>
      <div class="final-stats" id="finalStats"></div>
      <div class="end-btns">
        <button class="btn-restart" id="btnRestart">再来一轮</button>
        <button class="btn-report" id="btnReport" style="padding:14px 36px;border-radius:14px;border:none;background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;display:none">生成学案报告</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入中文释义，回车提交" disabled autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="btnSubmit" disabled>提交</button>
  </div>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div class="feedback" id="feedback">&nbsp;</div>
    <button class="btn-skip" id="btnSkip" disabled>跳过</button>
  </div>
</div>

<script>
const WORD_BANK = [
  { en:"abandon", zh:"放弃", pos:"v.", phonetic:"/ə'bændən/" },
  { en:"absolute", zh:"绝对的", pos:"adj.", phonetic:"/'æbsəluːt/" },
  { en:"absorb", zh:"吸收", pos:"v.", phonetic:"/əb'zɔːb/" },
  { en:"abstract", zh:"抽象的", pos:"adj.", phonetic:"/'æbstrækt/" },
  { en:"academic", zh:"学术的", pos:"adj.", phonetic:"/ˌækə'demɪk/" },
  { en:"accelerate", zh:"加速", pos:"v.", phonetic:"/ək'seləreɪt/" },
  { en:"accomplish", zh:"完成", pos:"v.", phonetic:"/ə'kɒmplɪʃ/" },
  { en:"accurate", zh:"准确的", pos:"adj.", phonetic:"/'ækjərət/" },
  { en:"achieve", zh:"实现", pos:"v.", phonetic:"/ə'tʃiːv/" },
  { en:"acknowledge", zh:"承认", pos:"v.", phonetic:"/ək'nɒlɪdʒ/" },
  { en:"acquire", zh:"获得", pos:"v.", phonetic:"/ə'kwaɪər/" },
  { en:"adapt", zh:"适应", pos:"v.", phonetic:"/ə'dæpt/" },
  { en:"adequate", zh:"充足的", pos:"adj.", phonetic:"/'ædɪkwət/" },
  { en:"adjust", zh:"调整", pos:"v.", phonetic:"/ə'dʒʌst/" },
  { en:"admire", zh:"钦佩", pos:"v.", phonetic:"/əd'maɪər/" },
  { en:"adopt", zh:"采纳", pos:"v.", phonetic:"/ə'dɒpt/" },
  { en:"advance", zh:"前进", pos:"v.", phonetic:"/əd'vɑːns/" },
  { en:"advantage", zh:"优势", pos:"n.", phonetic:"/əd'vɑːntɪdʒ/" },
  { en:"affect", zh:"影响", pos:"v.", phonetic:"/ə'fekt/" },
  { en:"afford", zh:"负担得起", pos:"v.", phonetic:"/ə'fɔːd/" },
  { en:"ambitious", zh:"有雄心的", pos:"adj.", phonetic:"/æm'bɪʃəs/" },
  { en:"analyze", zh:"分析", pos:"v.", phonetic:"/'ænəlaɪz/" },
  { en:"announce", zh:"宣布", pos:"v.", phonetic:"/ə'naʊns/" },
  { en:"anxiety", zh:"焦虑", pos:"n.", phonetic:"/æŋ'zaɪəti/" },
  { en:"apparent", zh:"明显的", pos:"adj.", phonetic:"/ə'pærənt/" },
  { en:"appeal", zh:"呼吁", pos:"v.", phonetic:"/ə'piːl/" },
  { en:"appreciate", zh:"感激", pos:"v.", phonetic:"/ə'priːʃieɪt/" },
  { en:"approach", zh:"方法", pos:"n.", phonetic:"/ə'prəʊtʃ/" },
  { en:"appropriate", zh:"适当的", pos:"adj.", phonetic:"/ə'prəʊpriət/" },
  { en:"approve", zh:"批准", pos:"v.", phonetic:"/ə'pruːv/" },
  { en:"arrange", zh:"安排", pos:"v.", phonetic:"/ə'reɪndʒ/" },
  { en:"artificial", zh:"人工的", pos:"adj.", phonetic:"/ˌɑːtɪ'fɪʃl/" },
  { en:"aspect", zh:"方面", pos:"n.", phonetic:"/'æspekt/" },
  { en:"assess", zh:"评估", pos:"v.", phonetic:"/ə'ses/" },
  { en:"assist", zh:"协助", pos:"v.", phonetic:"/ə'sɪst/" },
  { en:"assume", zh:"假设", pos:"v.", phonetic:"/ə'sjuːm/" },
  { en:"atmosphere", zh:"氛围", pos:"n.", phonetic:"/'ætməsfɪər/" },
  { en:"attempt", zh:"尝试", pos:"v.", phonetic:"/ə'tempt/" },
  { en:"attitude", zh:"态度", pos:"n.", phonetic:"/'ætɪtjuːd/" },
  { en:"attract", zh:"吸引", pos:"v.", phonetic:"/ə'trækt/" },
  { en:"authority", zh:"权威", pos:"n.", phonetic:"/ɔː'θɒrəti/" },
  { en:"available", zh:"可用的", pos:"adj.", phonetic:"/ə'veɪləbl/" },
  { en:"aware", zh:"意识到的", pos:"adj.", phonetic:"/ə'weər/" },
  { en:"balance", zh:"平衡", pos:"n.", phonetic:"/'bæləns/" },
  { en:"benefit", zh:"好处", pos:"n.", phonetic:"/'benɪfɪt/" },
  { en:"challenge", zh:"挑战", pos:"n.", phonetic:"/'tʃælɪndʒ/" },
  { en:"concentrate", zh:"集中注意力", pos:"v.", phonetic:"/'kɒnsntreɪt/" },
  { en:"confident", zh:"自信的", pos:"adj.", phonetic:"/'kɒnfɪdənt/" },
  { en:"contribute", zh:"贡献", pos:"v.", phonetic:"/kən'trɪbjuːt/" },
  { en:"curious", zh:"好奇的", pos:"adj.", phonetic:"/'kjʊəriəs/" },
  { en:"decrease", zh:"减少", pos:"v.", phonetic:"/dɪ'kriːs/" },
  { en:"determine", zh:"决定", pos:"v.", phonetic:"/dɪ'tɜːmɪn/" },
  { en:"devote", zh:"致力于", pos:"v.", phonetic:"/dɪ'vəʊt/" },
  { en:"efficient", zh:"高效的", pos:"adj.", phonetic:"/ɪ'fɪʃnt/" },
  { en:"eliminate", zh:"消除", pos:"v.", phonetic:"/ɪ'lɪmɪneɪt/" },
  { en:"encourage", zh:"鼓励", pos:"v.", phonetic:"/ɪn'kʌrɪdʒ/" },
  { en:"enthusiasm", zh:"热情", pos:"n.", phonetic:"/ɪn'θjuːziæzəm/" },
  { en:"evaluate", zh:"评价", pos:"v.", phonetic:"/ɪ'væljueɪt/" },
  { en:"evidence", zh:"证据", pos:"n.", phonetic:"/'evɪdəns/" },
  { en:"experience", zh:"经验", pos:"n.", phonetic:"/ɪk'spɪəriəns/" }
];

const DIFFICULTY = { easy: 30, normal: 15, hard: 8 };
const TOTAL_ROUNDS = 20;
const BASE_SCORE = 10;

let round = 0, score = 0, correct = 0, combo = 0, maxCombo = 0;
let currentWord = null, wordsInGame = [];
let timerInterval = null, timeLeft = 0, selectedDiff = 'easy';
let totalTime = 0;

const $ = id => document.getElementById(id);

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playYeah() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
  osc1.type = 'sine'; osc2.type = 'sine';
  osc1.frequency.setValueAtTime(600, t);
  osc1.frequency.linearRampToValueAtTime(900, t + 0.12);
  osc2.frequency.setValueAtTime(750, t + 0.05);
  osc2.frequency.linearRampToValueAtTime(1100, t + 0.18);
  gain.gain.setValueAtTime(0.35, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc1.start(t); osc1.stop(t + 0.4);
  osc2.start(t + 0.05); osc2.stop(t + 0.4);
}
function playNo() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.linearRampToValueAtTime(150, t + 0.3);
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.start(t); osc.stop(t + 0.35);
}
const card = $('card');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStats() {
  $('scoreDisplay').textContent = score;
  $('roundDisplay').textContent = round;
  const rate = round > 0 ? Math.round(correct / round * 100) : 0;
  $('accuracyDisplay').textContent = round > 0 ? rate + '%' : '--';
  $('progressFill').style.width = (round / TOTAL_ROUNDS * 100) + '%';
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = DIFFICULTY[selectedDiff];
  $('timerDisplay').textContent = timeLeft + 's';
  $('timerDisplay').className = 'value';
  timerInterval = setInterval(() => {
    timeLeft--;
    totalTime++;
    $('timerDisplay').textContent = timeLeft + 's';
    if (timeLeft <= 5) $('timerDisplay').className = 'value timer-warn';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout() {
  if(currentWord) currentWord._correct = false;
  combo = 0;
  $('comboBadge').style.display = 'none';
  round++;
  setFeedback('超时，正确答案: ' + currentWord.zh, 'wrong');
  flashCard('wrong-flash');
  $('userInput').disabled = true;
  $('btnSubmit').disabled = true;
  $('btnSkip').disabled = true;
  updateStats();
  setTimeout(nextWord, 900);
}

function setFeedback(text, type) {
  const el = $('feedback');
  el.textContent = text;
  el.className = 'feedback ' + (type || '');
}

function flashCard(cls) {
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 400);
}

function showCombo() {
  if (combo >= 2) {
    const badge = $('comboBadge');
    badge.textContent = combo + 'x 连击';
    badge.style.display = 'block';
    badge.style.animation = 'none';
    void badge.offsetWidth;
    badge.style.animation = 'pop 0.3s ease';
  } else {
    $('comboBadge').style.display = 'none';
  }
}

function nextWord() {
  if (round >= TOTAL_ROUNDS) return endGame();
  currentWord = wordsInGame[round];
  if(currentWord._correct === undefined) currentWord._correct = false;

  $('wordDisplay').textContent = currentWord.en;
  $('wordPhonetic').textContent = currentWord.phonetic || '';
  $('wordPos').textContent = currentWord.pos || '';
  $('userInput').value = '';
  $('userInput').disabled = false;
  $('userInput').focus();
  $('btnSubmit').disabled = false;
  $('btnSkip').disabled = false;
  setFeedback('\u00A0');
  startTimer();
  updateStats();
}

function handleSubmit() {
  if (!currentWord || round >= TOTAL_ROUNDS) return;
  const answer = $('userInput').value.trim();
  if (!answer) { setFeedback('请输入释义', 'wrong'); return; }
  clearInterval(timerInterval);
  const isCorrect = answer === currentWord.zh;
  round++;
  if (isCorrect) {
    currentWord._correct = true;
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    const bonus = combo >= 3 ? Math.floor(combo / 3) * 5 : 0;
    score += BASE_SCORE + bonus;
    correct++;
    const msg = bonus > 0 ? `正确 +${BASE_SCORE + bonus}分 (连击加成+${bonus})` : '正确 +10分';
    setFeedback(msg, 'correct');
    flashCard('correct-flash');
    showCombo();
    playYeah();
  } else {
    currentWord._correct = false;
    combo = 0;
    $('comboBadge').style.display = 'none';
    setFeedback('错误，正确答案: ' + currentWord.zh, 'wrong');
    flashCard('wrong-flash');
    playNo();
  }
  $('userInput').disabled = true;
  $('btnSubmit').disabled = true;
  $('btnSkip').disabled = true;
  $('timerDisplay').textContent = '--';
  $('timerDisplay').className = 'value';
  updateStats();
  setTimeout(nextWord, 800);
}

function handleSkip() {
  currentWord._correct = false;
  clearInterval(timerInterval);
  combo = 0;
  $('comboBadge').style.display = 'none';
  round++;
  setFeedback('已跳过，答案: ' + currentWord.zh, 'wrong');
  $('userInput').disabled = true;
  $('btnSubmit').disabled = true;
  $('btnSkip').disabled = true;
  updateStats();
  setTimeout(nextWord, 800);
}

function endGame() {
  clearInterval(timerInterval);
  $('userInput').disabled = true;
  $('btnSubmit').disabled = true;
  $('btnSkip').disabled = true;
  $('timerDisplay').textContent = '--';
  $('gameScreen').classList.add('hidden');
  $('endScreen').style.display = 'flex';
  $('progressFill').style.width = '100%';
  $('finalScore').textContent = score;
  const rate = Math.round(correct / TOTAL_ROUNDS * 100);
  let grade, gradeColor;
  if (rate >= 90) { grade = '满分神手'; gradeColor = '#ffd200'; }
  else if (rate >= 75) { grade = '优秀'; gradeColor = '#4ade80'; }
  else if (rate >= 60) { grade = '良好'; gradeColor = '#60a5fa'; }
  else { grade = '继续加油'; gradeColor = '#f87171'; }
  const gradeEl = $('finalGrade');
  gradeEl.textContent = grade;
  gradeEl.style.background = gradeColor + '22';
  gradeEl.style.color = gradeColor;
  $('finalStats').innerHTML = `正确 ${correct} / ${TOTAL_ROUNDS}&nbsp;&nbsp;正确率 ${rate}%<br>最高连击 ${maxCombo}x`;
  $('btnReport').style.display = 'inline-block';
}

// ===== 生成学案报告 =====

function startGame() {
  round = 0; score = 0; correct = 0; combo = 0; maxCombo = 0; totalTime = 0;
  wordsInGame = shuffle(WORD_BANK).slice(0, TOTAL_ROUNDS);
  $('startScreen').classList.add('hidden');
  $('endScreen').style.display = 'none';
  $('gameScreen').classList.remove('hidden');
  $('comboBadge').style.display = 'none';
  setFeedback('\u00A0');
  nextWord();
}

// 难度切换
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDiff = btn.dataset.diff;
  });
});

$('btnStart').addEventListener('click', startGame);
$('btnRestart').addEventListener('click', startGame);
$('btnReport').addEventListener('click', generateReport);
$('btnSubmit').addEventListener('click', handleSubmit);
$('btnSkip').addEventListener('click', handleSkip);
$('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !$('btnSubmit').disabled) handleSubmit();
});
